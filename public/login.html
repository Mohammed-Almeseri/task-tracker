<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050816">
    <title>TaskTracker — Sign In</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://wqnrdahctafgdvsprkju.supabase.co">
    <link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</head>

<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-panel" aria-label="Authentication form">
            <div class="auth-card">
                <div class="auth-card-top">
                    <div>
                        <p class="auth-kicker">Welcome back</p>
                        <h2>Access your workspace</h2>
                    </div>
                    <span class="auth-chip">Protected session</span>
                </div>

                <div class="auth-tabs" role="tablist" aria-label="Authentication mode">
                    <button class="auth-tab active" type="button" data-mode="signin" aria-selected="true">Sign In</button>
                    <button class="auth-tab" type="button" data-mode="signup" aria-selected="false">Create Account</button>
                </div>

                <form id="signin-form" class="auth-form" novalidate>
                    <div class="field-group">
                        <label for="signin-email">Email</label>
                        <input class="field-input" id="signin-email" name="email" type="email" autocomplete="email"
                            placeholder="you@example.com" required>
                    </div>

                    <div class="field-group">
                        <div class="field-row">
                            <label for="signin-password">Password</label>
                            <a class="helper-link" href="forgot-password.html">Forgot password?</a>
                        </div>
                        <input class="field-input" id="signin-password" name="password" type="password"
                            autocomplete="current-password" placeholder="Enter your password" minlength="8" required>
                    </div>

                    <div class="auth-actions">
                        <button class="auth-button auth-button-primary" id="signin-submit" type="submit">Sign In</button>
                    </div>
                </form>

                <form id="signup-form" class="auth-form" hidden novalidate>
                    <div class="field-group">
                        <label for="signup-email">Email</label>
                        <input class="field-input" id="signup-email" name="email" type="email" autocomplete="email"
                            placeholder="you@example.com" required>
                    </div>

                    <div class="field-group">
                        <label for="signup-password">Password</label>
                        <input class="field-input" id="signup-password" name="password" type="password"
                            autocomplete="new-password" placeholder="Create a password" minlength="8" required>
                    </div>

                    <div class="field-group">
                        <label for="signup-confirm">Confirm password</label>
                        <input class="field-input" id="signup-confirm" name="confirm-password" type="password"
                            autocomplete="new-password" placeholder="Repeat your password" minlength="8" required>
                    </div>

                    <div class="auth-actions">
                        <button class="auth-button auth-button-primary" id="signup-submit" type="submit">Create Account</button>
                    </div>
                </form>

                <div class="auth-status is-info" id="auth-status" role="status" aria-live="polite"></div>
            </div>

            <p class="auth-note">
                Use the form above to access your workspace.
            </p>
        </section>
    </main>

    <div id="auth-toast-container" class="auth-toast-container" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="login.js"></script>
</body>

</html>
