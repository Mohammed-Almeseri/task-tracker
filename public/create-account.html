<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Create Account — Access your workspace</title>
  <meta name="description" content="Create an account to access your secure workspace." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
/* Shared auth styles — dark gradient, mobile-first */
*,
*::before,
*::after { box-sizing: border-box; }

:root {
  --bg-1: #0a1420;
  --bg-2: #0a0f1c;
  --bg-3: #1a0f24;
  --card: rgba(16, 20, 35, 0.72);
  --border: rgba(120, 140, 180, 0.18);
  --border-strong: rgba(120, 140, 180, 0.3);
  --input-bg: rgba(20, 26, 42, 0.6);
  --text: #f0f4fa;
  --muted: #8a96ad;
  --primary: #2dd4f7;
  --grad: linear-gradient(90deg, #7ce7ff 0%, #b39bff 100%);
  --shadow-card: 0 20px 60px -20px rgba(0, 0, 0, 0.8);
  --shadow-cta: 0 10px 30px -10px rgba(124, 231, 255, 0.45);
}

html, body { margin: 0; padding: 0; min-height: 100%; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: var(--text);
  background:
    radial-gradient(ellipse at top left, #0f2a3a 0%, transparent 50%),
    radial-gradient(ellipse at bottom right, #2a1438 0%, transparent 55%),
    linear-gradient(135deg, var(--bg-1), var(--bg-2) 50%, var(--bg-3));
  background-attachment: fixed;
  position: relative;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle at 1px 1px, rgba(124, 231, 255, 0.06) 1px, transparent 0);
  background-size: 28px 28px;
  pointer-events: none;
  z-index: 0;
}

.auth-wrap {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}

.auth-shell {
  width: 100%;
  max-width: 440px;
}

.auth-card {
  background: var(--card);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 28px 22px;
  box-shadow: var(--shadow-card);
}

.card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 24px;
}

.eyebrow {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.2em;
  color: var(--primary);
  text-transform: uppercase;
  margin: 0 0 8px;
}

.title {
  font-size: 28px;
  font-weight: 800;
  line-height: 1.1;
  margin: 0;
  letter-spacing: -0.01em;
}

.badge {
  flex-shrink: 0;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text);
  background: rgba(40, 50, 80, 0.4);
  border: 1px solid var(--border-strong);
  padding: 8px 12px;
  border-radius: 999px;
  white-space: nowrap;
}

.lead {
  color: var(--muted);
  font-size: 14px;
  line-height: 1.5;
  margin: 0 0 22px;
}

.field { margin-bottom: 18px; }

.field-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.field label {
  display: block;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
}

.field-row label { margin-bottom: 0; }

.link-inline {
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  text-decoration: none;
}
.link-inline:hover { text-decoration: underline; }

.input {
  width: 100%;
  background: var(--input-bg);
  border: 1px solid var(--border-strong);
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 16px;
  color: var(--text);
  font-family: inherit;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.input::placeholder { color: rgba(140, 152, 173, 0.7); }

.input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(45, 212, 247, 0.18);
}

.tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px;
  background: rgba(20, 26, 42, 0.5);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 4px;
  margin-bottom: 22px;
}

.tab {
  display: block;
  text-align: center;
  padding: 12px 8px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  color: var(--muted);
  text-decoration: none;
  transition: background 0.15s, color 0.15s;
}

.tab.active {
  background: rgba(40, 50, 80, 0.55);
  color: var(--text);
  box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.3);
}

.cta {
  display: block;
  width: 100%;
  background: var(--grad);
  color: #0a0f1c;
  font-family: inherit;
  font-size: 16px;
  font-weight: 800;
  border: 0;
  border-radius: 14px;
  padding: 15px;
  cursor: pointer;
  box-shadow: var(--shadow-cta);
  transition: transform 0.1s, opacity 0.15s;
  margin-top: 6px;
}

.cta:hover { opacity: 0.95; }
.cta:active { transform: scale(0.99); }

.cta.is-loading {
  color: transparent !important;
  pointer-events: none;
  position: relative;
}
.cta.is-loading::after {
  content: '';
  position: absolute;
  width: 20px;
  height: 20px;
  top: 50%;
  left: 50%;
  margin-top: -10px;
  margin-left: -10px;
  border: 3px solid rgba(10, 15, 28, 0.2);
  border-top-color: #0a0f1c;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

.hint {
  margin-top: 12px;
  background: rgba(20, 26, 42, 0.45);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 13px;
  color: var(--muted);
  text-align: center;
}

.foot {
  margin-top: 22px;
  text-align: center;
  font-size: 14px;
  color: var(--muted);
}

.foot a {
  color: var(--primary);
  font-weight: 700;
  text-decoration: none;
}
.foot a:hover { text-decoration: underline; }

/* Tablet & up */
@media (min-width: 480px) {
  .auth-wrap { padding: 40px 24px; }
  .auth-card { padding: 36px 32px; border-radius: 28px; }
  .title { font-size: 36px; }
  .eyebrow { font-size: 12px; }
  .badge { font-size: 11px; padding: 9px 14px; }
  .lead { font-size: 15px; }
  .tab { padding: 14px; font-size: 15px; }
}

  </style>
</head>
<body>
  <main class="auth-wrap">
    <div class="auth-shell">
      <section class="auth-card" aria-labelledby="auth-title">
        <header class="card-head">
          <div>
            <p class="eyebrow">Welcome back</p>
            <h1 class="title" id="auth-title">Access your workspace</h1>
          </div>
          <span class="badge">Protected session</span>
        </header>

        <nav class="tabs" aria-label="Authentication mode">
          <a class="tab" href="login.html">Sign In</a>
          <a class="tab active" href="create-account.html" aria-current="page">Create Account</a>
        </nav>

        <form action="#" id="signup-form" method="post" novalidate>
          <div class="field">
            <label for="email">Email</label>
            <input class="input" type="email" id="signup-email" name="email" placeholder="you@example.com" autocomplete="email" required />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input class="input" type="password" id="signup-password" name="password" placeholder="Create a password" autocomplete="new-password" required />
          </div>

          <div class="field">
            <label for="confirm">Confirm password</label>
            <input class="input" type="password" id="signup-confirm" name="confirm" placeholder="Repeat your password" autocomplete="new-password" required />
          </div>

          <button type="submit" class="cta" id="signup-submit">Create Account</button>
        </form>
          <div class="auth-status is-info" id="auth-status" role="status" aria-live="polite" style="margin-top: 16px; text-align: center; font-size: 14px; color: var(--primary);"></div>
      </section>

      <p class="foot">Use the form above to access your workspace.</p>
    </div>
  </main>
  <div id="auth-toast-container" class="auth-toast-container" aria-live="polite" aria-atomic="true"></div>
  <script type="module" src="login.js"></script>
</body>
</html>
