<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#07101b">
    <title>TaskTracker — Forgot Password</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</head>

<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-panel" aria-label="Password recovery form">
            <div class="auth-card">
                <div class="auth-card-top">
                    <div>
                        <p class="auth-kicker" id="recovery-kicker">Password recovery</p>
                        <h2 id="recovery-title">Forgot your password?</h2>
                    </div>
                    <span class="auth-chip" id="recovery-chip">Supabase recovery</span>
                </div>

                <p class="auth-note" id="recovery-intro" style="margin-top: 0; margin-bottom: 20px;">
                    Enter the email on your account and we will send a reset link.
                </p>

                <form id="reset-request-form" class="auth-form" novalidate>
                    <div class="field-group">
                        <label for="reset-email">Email</label>
                        <input class="field-input" id="reset-email" name="email" type="email" autocomplete="email"
                            placeholder="you@example.com" required>
                    </div>

                    <div class="auth-actions">
                        <button class="auth-button auth-button-primary" id="reset-request-submit" type="submit">
                            Send reset link
                        </button>
                    </div>
                </form>

                <form id="reset-update-form" class="auth-form" hidden novalidate>
                    <div class="field-group">
                        <label for="reset-new-password">New password</label>
                        <input class="field-input" id="reset-new-password" name="new-password" type="password"
                            autocomplete="new-password" placeholder="Create a new password" minlength="8" required>
                    </div>

                    <div class="field-group">
                        <label for="reset-confirm-password">Confirm password</label>
                        <input class="field-input" id="reset-confirm-password" name="confirm-password" type="password"
                            autocomplete="new-password" placeholder="Repeat your password" minlength="8" required>
                    </div>

                    <div class="auth-actions">
                        <button class="auth-button auth-button-primary" id="reset-update-submit" type="submit">
                            Update password
                        </button>
                    </div>
                </form>

                <div class="auth-status is-info" id="auth-status" role="status" aria-live="polite"></div>
            </div>

            <p class="auth-note">
                Remember your password? <a href="login.html">Sign in</a>
            </p>
        </section>
    </main>

    <div id="auth-toast-container" class="auth-toast-container" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="forgot-password.js"></script>
</body>

</html>
