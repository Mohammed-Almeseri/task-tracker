<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#050816">
    <title>Planovya — Account Confirmed</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
    <style>
        :root {
            --bg: #050816;
            --bg-card: rgba(8, 14, 26, 0.76);
            --text: #f5f8ff;
            --muted: #a2b1c8;
            --accent: #6ee7ff;
            --accent-2: #9a7dff;
            --accent-3: #25d08f;
            --success-glow: rgba(37, 208, 143, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            min-height: 100%;
        }

        body {
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
        }

        /* Animated background orbs */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.35;
            z-index: 0;
            animation: orbFloat 12s ease-in-out infinite alternate;
        }

        body::before {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(37, 208, 143, 0.25), transparent 70%);
            top: -120px;
            right: -80px;
        }

        body::after {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(110, 231, 255, 0.2), transparent 70%);
            bottom: -100px;
            left: -60px;
            animation-delay: -6s;
        }

        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, -30px) scale(1.15); }
        }

        .confirmed-shell {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
        }

        .confirmed-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 56px 40px 48px;
            text-align: center;
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.03),
                0 24px 80px rgba(0, 0, 0, 0.5),
                0 0 120px var(--success-glow);
            animation: cardReveal 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes cardReveal {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Animated checkmark circle */
        .check-circle {
            width: 96px;
            height: 96px;
            margin: 0 auto 32px;
            position: relative;
        }

        .check-circle svg {
            width: 96px;
            height: 96px;
        }

        .check-circle-ring {
            fill: none;
            stroke: var(--accent-3);
            stroke-width: 3;
            stroke-dasharray: 282.7;
            stroke-dashoffset: 282.7;
            animation: ringDraw 1s 0.3s cubic-bezier(0.65, 0, 0.35, 1) forwards;
            filter: drop-shadow(0 0 8px rgba(37, 208, 143, 0.4));
        }

        .check-circle-check {
            fill: none;
            stroke: var(--accent-3);
            stroke-width: 3.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 40;
            stroke-dashoffset: 40;
            animation: checkDraw 0.5s 1.1s cubic-bezier(0.65, 0, 0.35, 1) forwards;
            filter: drop-shadow(0 0 6px rgba(37, 208, 143, 0.5));
        }

        @keyframes ringDraw {
            to { stroke-dashoffset: 0; }
        }

        @keyframes checkDraw {
            to { stroke-dashoffset: 0; }
        }

        /* Success glow pulse behind circle */
        .check-circle::before {
            content: '';
            position: absolute;
            inset: -16px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(37, 208, 143, 0.15), transparent 70%);
            animation: glowPulse 2.5s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        .confirmed-kicker {
            font-family: 'Space Grotesk', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent-3);
            margin-bottom: 12px;
            opacity: 0;
            animation: fadeUp 0.5s 1.4s ease forwards;
        }

        .confirmed-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--text) 0%, var(--accent-3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeUp 0.5s 1.5s ease forwards;
        }

        .confirmed-message {
            font-size: 0.95rem;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 36px;
            opacity: 0;
            animation: fadeUp 0.5s 1.6s ease forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .confirmed-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 300px;
            padding: 16px 32px;
            font-family: 'Manrope', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: #050816;
            background: linear-gradient(135deg, var(--accent-3), #4ade80, var(--accent));
            border: none;
            border-radius: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow:
                0 4px 24px rgba(37, 208, 143, 0.3),
                0 0 0 1px rgba(37, 208, 143, 0.1);
            opacity: 0;
            animation: fadeUp 0.5s 1.8s ease forwards;
            touch-action: manipulation;
        }

        .confirmed-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow:
                0 8px 32px rgba(37, 208, 143, 0.4),
                0 0 0 1px rgba(37, 208, 143, 0.2);
        }

        .confirmed-btn:active {
            transform: translateY(0) scale(0.98);
        }

        .confirmed-btn svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .confirmed-footer {
            margin-top: 28px;
            font-size: 0.8rem;
            color: rgba(162, 177, 200, 0.5);
            opacity: 0;
            animation: fadeUp 0.5s 2s ease forwards;
        }

        .confetti {
            position: fixed;
            z-index: 0;
            pointer-events: none;
        }

        .confetti-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            opacity: 0;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(720deg) scale(0.3);
            }
        }

        /* Mobile */
        @media (max-width: 480px) {
            .confirmed-card {
                padding: 40px 24px 36px;
                border-radius: 20px;
            }

            .confirmed-title {
                font-size: 1.4rem;
            }

            .check-circle {
                width: 80px;
                height: 80px;
                margin-bottom: 24px;
            }

            .check-circle svg {
                width: 80px;
                height: 80px;
            }
        }
    </style>
</head>

<body>
    <div class="confirmed-shell">
        <div class="confirmed-card">
            <!-- Animated check circle -->
            <div class="check-circle">
                <svg viewBox="0 0 96 96">
                    <circle class="check-circle-ring" cx="48" cy="48" r="45" />
                    <polyline class="check-circle-check" points="30 50 42 62 66 36" />
                </svg>
            </div>

            <p class="confirmed-kicker">Account Verified</p>
            <h1 class="confirmed-title">You're all set!</h1>
            <p class="confirmed-message">
                Your email has been successfully verified and your account is now active.
                You can sign in and start tracking your goals.
            </p>

            <a href="login.html?mode=signin" class="confirmed-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                    <polyline points="10 17 15 12 10 7"/>
                    <line x1="15" y1="12" x2="3" y2="12"/>
                </svg>
                Go to Sign In
            </a>

            <p class="confirmed-footer">Planovya — Personal Productivity</p>
        </div>
    </div>

    <!-- Confetti effect -->
    <div class="confetti" id="confetti-container"></div>
    <script>
        // Spawn confetti dots
        (function () {
            const container = document.getElementById('confetti-container');
            if (!container) return;
            const colors = ['#25d08f', '#6ee7ff', '#9a7dff', '#ff8bb8', '#fbbf24', '#4ade80'];
            for (let i = 0; i < 30; i++) {
                const dot = document.createElement('div');
                dot.className = 'confetti-dot';
                dot.style.left = Math.random() * 100 + 'vw';
                dot.style.top = -10 + Math.random() * 20 + 'px';
                dot.style.width = (4 + Math.random() * 6) + 'px';
                dot.style.height = dot.style.width;
                dot.style.background = colors[Math.floor(Math.random() * colors.length)];
                dot.style.animationDelay = (0.8 + Math.random() * 1.5) + 's';
                dot.style.animationDuration = (2 + Math.random() * 2) + 's';
                container.appendChild(dot);
            }
        })();
    </script>
</body>

</html>
