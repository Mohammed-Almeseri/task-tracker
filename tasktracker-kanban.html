<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TaskTracker · Kanban</title>
<style>
  :root {
    --bg: #0d0b1a;
    --card: #181432;
    --border: #2a234a;
    --muted: #8a83a8;
    --text: #f1eefc;
    --purple: #a855f7;
    --pink: #ec4899;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --blue: #38bdf8;
    --indigo: #818cf8;
    --grad: linear-gradient(135deg, #a855f7, #ec4899);
    --grad-card: linear-gradient(160deg, rgba(24,20,50,.95), rgba(17,14,36,.95));
    --shadow-card: 0 8px 30px -12px rgba(80,30,140,.6);
    --shadow-glow: 0 8px 30px -8px rgba(236,72,153,.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    background-image:
      radial-gradient(120% 80% at 0% 0%, rgba(168,85,247,.22), transparent 60%),
      radial-gradient(100% 80% at 100% 0%, rgba(236,72,153,.16), transparent 60%);
    background-attachment: fixed;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 100px;
  }
  button { font: inherit; color: inherit; border: 0; background: none; cursor: pointer; }
  .grad-text { background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }

  .topbar {
    position: sticky; top: 0; z-index: 30;
    backdrop-filter: blur(20px);
    background: rgba(13,11,26,.7);
    border-bottom: 1px solid rgba(42,35,74,.5);
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .brand { display: flex; align-items: center; gap: 8px; }
  .brand-logo {
    width: 32px; height: 32px; border-radius: 10px;
    background: var(--grad);
    display: grid; place-items: center;
    box-shadow: 0 8px 24px -8px rgba(168,85,247,.6);
    color: white;
  }
  .brand-name { font-size: 14px; font-weight: 700; line-height: 1.1; }
  .brand-sub { font-size: 9px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(40,34,68,.4);
    border: 1px solid rgba(60,50,100,.5);
    display: grid; place-items: center; color: var(--muted);
  }
  .top-actions { display: flex; gap: 8px; }

  main { max-width: 480px; margin: 0 auto; padding: 16px; }

  .page-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 16px; gap: 12px;
  }
  .page-title { font-size: 24px; font-weight: 800; letter-spacing: -.02em; }
  .page-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .filter {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 12px; border-radius: 999px;
    background: rgba(40,34,68,.4);
    border: 1px solid rgba(60,50,100,.5);
    font-size: 11px; color: var(--text);
  }

  .cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .col {
    border-radius: 16px; padding: 12px;
    background: rgba(40,34,68,.25);
    border: 1px solid rgba(60,50,100,.5);
    text-align: left; transition: all .2s;
  }
  .col.active {
    background: var(--grad-card);
    box-shadow: var(--shadow-card);
  }
  .col[data-status="todo"].active { border-color: var(--indigo); box-shadow: 0 0 0 1px var(--indigo), var(--shadow-card); }
  .col[data-status="progress"].active { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue), var(--shadow-card); }
  .col[data-status="done"].active { border-color: var(--green); box-shadow: 0 0 0 1px var(--green), var(--shadow-card); }
  .col-head { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .col-dot { width: 8px; height: 8px; border-radius: 50%; }
  .col-label { font-size: 10px; font-weight: 500; color: var(--muted); }
  .col.active .col-label { color: var(--text); }
  .col-count { font-size: 18px; font-weight: 700; }

  .cards { display: flex; flex-direction: column; gap: 10px; }
  .kcard {
    background: var(--grad-card);
    border: 1px solid rgba(42,35,74,.7);
    border-radius: 16px;
    box-shadow: var(--shadow-card);
    padding: 14px;
    display: flex; gap: 8px; align-items: flex-start;
  }
  .pdot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .kcard-main { flex: 1; min-width: 0; }
  .kcard-title { font-size: 14px; font-weight: 600; line-height: 1.3; margin-bottom: 6px; }
  .kcard-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .pill {
    font-size: 10px; padding: 2px 8px; border-radius: 999px;
    background: rgba(60,50,100,.5); color: var(--muted);
  }
  .date { font-size: 10px; color: var(--muted); }

  .empty {
    border: 1px dashed rgba(60,50,100,.6);
    border-radius: 16px;
    padding: 32px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }
  .add-row {
    margin-top: 16px;
    width: 100%;
    border: 1px dashed rgba(60,50,100,.6);
    border-radius: 16px;
    padding: 12px;
    font-size: 12px; color: var(--muted);
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }

  /* Bottom nav */
  .bn-wrap {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 8px 12px 12px; z-index: 40;
    pointer-events: none;
  }
  .bn {
    pointer-events: auto;
    max-width: 480px; margin: 0 auto;
    background: rgba(24,20,50,.9);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(42,35,74,.6);
    border-radius: 20px;
    box-shadow: var(--shadow-card);
    display: grid; grid-template-columns: repeat(6, 1fr);
  }
  .bn button {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 10px 4px;
  }
  .bn-icon {
    width: 36px; height: 36px; border-radius: 50%;
    display: grid; place-items: center;
    color: var(--muted); font-size: 16px;
    transition: all .2s ease;
  }
  .bn button.active .bn-icon {
    background: var(--grad); color: white;
    box-shadow: var(--shadow-glow);
  }
  .bn-label { font-size: 9px; font-weight: 500; color: var(--muted); }
  .bn button.active .bn-label { color: var(--pink); }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="brand-logo">⚡</div>
    <div>
      <div class="brand-name grad-text">TaskTracker</div>
      <div class="brand-sub"><span class="dot"></span>Local Only</div>
    </div>
  </div>
  <div class="top-actions">
    <button class="icon-btn" aria-label="Notifications">🔔</button>
    <button class="icon-btn" aria-label="Settings">⚙️</button>
  </div>
</header>

<main>
  <div class="page-head">
    <div>
      <h1 class="page-title grad-text">Kanban Board</h1>
      <p class="page-sub">Tap a column to switch status</p>
    </div>
    <button class="filter">— All Goals — ▾</button>
  </div>

  <div class="cols" id="cols"></div>
  <div class="cards" id="cards"></div>
  <button class="add-row" id="addRow">＋ Add task</button>
</main>

<nav class="bn-wrap">
  <div class="bn">
    <button><div class="bn-icon">▦</div><div class="bn-label">Dashboard</div></button>
    <button><div class="bn-icon">◎</div><div class="bn-label">Goals</div></button>
    <button><div class="bn-icon">☰</div><div class="bn-label">Tasks</div></button>
    <button class="active"><div class="bn-icon">⊞</div><div class="bn-label">Kanban</div></button>
    <button><div class="bn-icon">⏱</div><div class="bn-label">Timer</div></button>
    <button><div class="bn-icon">📝</div><div class="bn-label">Notes</div></button>
  </div>
</nav>

<script>
  const priorityColor = {
    urgent: "var(--red)",
    high: "var(--amber)",
    medium: "var(--purple)",
    low: "var(--green)"
  };

  const cols = [
    { key: "todo",     label: "To Do",       color: "var(--indigo)" },
    { key: "progress", label: "In Progress", color: "var(--blue)" },
    { key: "done",     label: "Done",        color: "var(--green)" },
  ];

  const tasks = [
    // To Do
    { title: "Add ASCII", goal: "App", priority: "high", status: "todo" },
    { title: "a", goal: "App", priority: "low", status: "todo" },
    { title: "Work on TaskTracker", goal: "App", priority: "urgent", status: "todo" },
    { title: "Test time complexity", goal: "App", priority: "low", status: "todo" },
    { title: "Test", goal: "App", priority: "low", status: "todo" },
    { title: "NLP", goal: "AI Engineer", priority: "high", status: "todo" },
    { title: "LLM", goal: "AI Engineer", priority: "high", status: "todo" },
    { title: "Math HW 8 & Bonus 8", goal: "University", priority: "high", status: "todo", date: "May 2" },
    // Done
    { title: "Update and Improve Note System", goal: "App", priority: "high", status: "done" },
    { title: "Update the app", goal: "App", priority: "high", status: "done" },
    { title: "Add SKILL.md skills to perplexity", goal: "App", priority: "high", status: "done" },
    { title: "Log wasted time while upgrading", goal: "App", priority: "high", status: "done" },
    { title: "Python", goal: "AI Engineer", priority: "high", status: "done" },
    { title: "Finish Math HW 2 & Bonus 2", goal: "University", priority: "high", status: "done" },
    { title: "Finish Math HW 1 & Bonus 1", goal: "University", priority: "high", status: "done" },
    { title: "Finish Math HW 3 & Bonus 3", goal: "University", priority: "high", status: "done" },
    { title: "NewTrends W1 Assignment", goal: "University", priority: "high", status: "done" },
    { title: "NewTrends W2 & 3 Assignment", goal: "University", priority: "high", status: "done" },
    { title: "Finish Math HW 4 & Bonux 4", goal: "University", priority: "high", status: "done" },
    { title: "Finish Building the Future Assignment", goal: "University", priority: "high", status: "done" },
    { title: "Finish Physics Homework", goal: "University", priority: "urgent", status: "done" },
    { title: "Prepare for Software Engineer Exam", goal: "University", priority: "high", status: "done" },
    { title: "Finish HW 6 and Bonus 6", goal: "University", priority: "high", status: "done" },
    { title: "Finish New Trends assignment 11", goal: "University", priority: "high", status: "done" },
    { title: "Intro to Database HW", goal: "University", priority: "high", status: "done" },
    { title: "Intro to Database Quiz", goal: "University", priority: "high", status: "done" },
  ];

  let active = "todo";

  function renderCols() {
    document.getElementById("cols").innerHTML = cols.map(c => {
      const count = tasks.filter(t => t.status === c.key).length;
      return `
        <button class="col ${c.key === active ? "active":""}" data-status="${c.key}" onclick="setActive('${c.key}')">
          <div class="col-head">
            <span class="col-dot" style="background:${c.color}"></span>
            <span class="col-label">${c.label}</span>
          </div>
          <div class="col-count">${count}</div>
        </button>
      `;
    }).join("");
  }

  function renderCards() {
    const list = tasks.filter(t => t.status === active);
    const root = document.getElementById("cards");
    if (list.length === 0) {
      root.innerHTML = `<div class="empty">No tasks here yet</div>`;
      return;
    }
    root.innerHTML = list.map(t => `
      <div class="kcard">
        <span class="pdot" style="background:${priorityColor[t.priority]}"></span>
        <div class="kcard-main">
          <div class="kcard-title">${t.title}</div>
          <div class="kcard-meta">
            <span class="pill">${t.goal}</span>
            ${t.date ? `<span class="date">📅 ${t.date}</span>` : ""}
          </div>
        </div>
      </div>
    `).join("");
  }

  function updateAddLabel() {
    const c = cols.find(c => c.key === active);
    document.getElementById("addRow").textContent = `＋ Add task to ${c.label}`;
  }

  function setActive(k) {
    active = k;
    renderCols();
    renderCards();
    updateAddLabel();
  }

  renderCols();
  renderCards();
  updateAddLabel();
</script>
</body>
</html>
