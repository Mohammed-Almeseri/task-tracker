<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>TaskTracker · Goals</title>
<style>
  :root {
    --bg: #0d0b1a;
    --bg-2: #14112a;
    --card: #181432;
    --card-2: #110e24;
    --border: #2a234a;
    --muted: #8a83a8;
    --text: #f1eefc;
    --purple: #a855f7;
    --pink: #ec4899;
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
    --blue: #38bdf8;
    --grad: linear-gradient(135deg, #a855f7, #ec4899);
    --grad-card: linear-gradient(160deg, rgba(24,20,50,.95), rgba(17,14,36,.95));
    --shadow-card: 0 8px 30px -12px rgba(80,30,140,.6);
    --shadow-glow: 0 8px 30px -8px rgba(236,72,153,.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    background-image:
      radial-gradient(120% 80% at 0% 0%, rgba(168,85,247,.22), transparent 60%),
      radial-gradient(100% 80% at 100% 0%, rgba(236,72,153,.16), transparent 60%);
    background-attachment: fixed;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 100px;
  }
  button { font: inherit; color: inherit; border: 0; background: none; cursor: pointer; }
  .grad-text {
    background: var(--grad);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  /* Top bar */
  .topbar {
    position: sticky; top: 0; z-index: 30;
    backdrop-filter: blur(20px);
    background: rgba(13,11,26,.7);
    border-bottom: 1px solid rgba(42,35,74,.5);
    padding: 12px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .brand { display: flex; align-items: center; gap: 8px; }
  .brand-logo {
    width: 32px; height: 32px; border-radius: 10px;
    background: var(--grad);
    display: grid; place-items: center;
    box-shadow: 0 8px 24px -8px rgba(168,85,247,.6);
    font-size: 16px; color: white;
  }
  .brand-name { font-size: 14px; font-weight: 700; line-height: 1.1; }
  .brand-sub { font-size: 9px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(40,34,68,.4);
    border: 1px solid rgba(60,50,100,.5);
    display: grid; place-items: center;
    color: var(--muted); font-size: 14px;
  }
  .top-actions { display: flex; gap: 8px; }

  /* Content */
  main {
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
  }
  .page-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 16px;
  }
  .page-title { font-size: 24px; font-weight: 800; letter-spacing: -.02em; }
  .page-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .new-btn {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--grad); color: white;
    padding: 8px 14px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
    box-shadow: var(--shadow-glow);
  }

  /* Goal card */
  .goal-list { display: flex; flex-direction: column; gap: 12px; }
  .goal {
    background: var(--grad-card);
    border: 1px solid rgba(42,35,74,.7);
    border-radius: 18px;
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .goal-head {
    width: 100%;
    text-align: left;
    padding: 16px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .chev {
    color: var(--muted); margin-top: 2px;
    transition: transform .2s ease;
    font-size: 12px;
  }
  .goal.open .chev { transform: rotate(90deg); }
  .goal-info { flex: 1; min-width: 0; }
  .goal-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
  .goal-name { font-size: 16px; font-weight: 700; }
  .row-actions { display: flex; gap: 4px; }
  .mini {
    width: 28px; height: 28px; border-radius: 8px;
    background: rgba(40,34,68,.5);
    display: grid; place-items: center;
    color: var(--muted); font-size: 12px;
  }
  .progress-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .tasks-count { font-size: 10px; color: var(--muted); white-space: nowrap; }
  .bar { flex: 1; height: 6px; background: rgba(60,50,100,.5); border-radius: 999px; overflow: hidden; }
  .bar > span { display: block; height: 100%; background: var(--grad); border-radius: 999px; }
  .pct { font-size: 11px; font-weight: 700; }
  .goal-desc { font-size: 11px; color: var(--muted); }

  .goal-body { padding: 0 16px 16px; display: none; flex-direction: column; gap: 8px; }
  .goal.open .goal-body { display: flex; }

  .task {
    background: rgba(40,34,68,.25);
    border: 1px solid rgba(60,50,100,.4);
    border-radius: 12px;
    padding: 10px 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .pdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .task-main { flex: 1; min-width: 0; }
  .task-title {
    font-size: 12px; font-weight: 500; line-height: 1.3;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .task-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  .task-date { font-size: 9px; color: var(--muted); }
  .task-date.overdue { color: var(--red); }
  .tag {
    font-size: 9px; padding: 2px 6px; border-radius: 999px;
    background: rgba(236,72,153,.15); color: var(--pink);
  }
  .time-chip {
    display: inline-flex; align-items: center; gap: 2px;
    font-size: 9px; color: var(--muted); flex-shrink: 0;
  }
  .status {
    font-size: 8px; font-weight: 700; letter-spacing: .04em;
    padding: 4px 8px; border-radius: 999px; flex-shrink: 0;
  }
  .status.todo { background: rgba(120,110,180,.25); color: #b8b3d4; }
  .status.done { background: rgba(34,197,94,.18); color: var(--green); }
  .status.progress { background: rgba(56,189,248,.18); color: var(--blue); }

  .add-task {
    width: 100%;
    border: 1px dashed rgba(60,50,100,.6);
    border-radius: 12px;
    padding: 8px;
    font-size: 11px;
    color: var(--muted);
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }

  /* Bottom nav */
  .bn-wrap {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 8px 12px 12px; z-index: 40;
    pointer-events: none;
  }
  .bn {
    pointer-events: auto;
    max-width: 480px; margin: 0 auto;
    background: rgba(24,20,50,.9);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(42,35,74,.6);
    border-radius: 20px;
    box-shadow: var(--shadow-card);
    display: grid; grid-template-columns: repeat(6, 1fr);
  }
  .bn button {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 10px 4px;
  }
  .bn-icon {
    width: 36px; height: 36px; border-radius: 50%;
    display: grid; place-items: center;
    color: var(--muted); font-size: 16px;
    transition: all .2s ease;
  }
  .bn button.active .bn-icon {
    background: var(--grad);
    color: white;
    box-shadow: var(--shadow-glow);
  }
  .bn-label { font-size: 9px; font-weight: 500; color: var(--muted); }
  .bn button.active .bn-label { color: var(--pink); }

  /* Icons via inline SVG sized by font */
  .i { display: inline-block; width: 1em; height: 1em; vertical-align: -.125em; }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <div class="brand-logo">⚡</div>
    <div>
      <div class="brand-name grad-text">TaskTracker</div>
      <div class="brand-sub"><span class="dot"></span>Local Only</div>
    </div>
  </div>
  <div class="top-actions">
    <button class="icon-btn" aria-label="Notifications">🔔</button>
    <button class="icon-btn" aria-label="Settings">⚙️</button>
  </div>
</header>

<main>
  <div class="page-head">
    <div>
      <h1 class="page-title grad-text">Goals</h1>
      <p class="page-sub">Set objectives and track your progress</p>
    </div>
    <button class="new-btn">＋ New Goal</button>
  </div>

  <div class="goal-list" id="goals"></div>
</main>

<nav class="bn-wrap">
  <div class="bn">
    <button><div class="bn-icon">▦</div><div class="bn-label">Dashboard</div></button>
    <button class="active"><div class="bn-icon">◎</div><div class="bn-label">Goals</div></button>
    <button><div class="bn-icon">☰</div><div class="bn-label">Tasks</div></button>
    <button><div class="bn-icon">⊞</div><div class="bn-label">Kanban</div></button>
    <button><div class="bn-icon">⏱</div><div class="bn-label">Timer</div></button>
    <button><div class="bn-icon">📝</div><div class="bn-label">Notes</div></button>
  </div>
</nav>

<script>
  const goals = [
    {
      name: "App",
      desc: "Used for TaskTracker related updates/Tasks",
      pct: 44, total: 9,
      accent: "var(--pink)",
      open: true,
      tasks: [
        { title: "Update and Improve Note System", status: "done" },
        { title: "Update the app", status: "done" },
        { title: "Add SKILL.md skills to perplexity for unlimited uses", status: "done", time: "1h" },
        { title: "Log the wasted time while upgrading the app", status: "done", time: "3h" },
        { title: "Add ASCII", status: "todo" },
        { title: "a", status: "todo" },
        { title: "Work on TaskTracker", status: "todo", time: "24h 53m", tags: ["Coding","Web","App"] },
        { title: "Test time complexity", status: "todo", time: "3m" },
        { title: "Test", status: "todo" },
      ]
    },
    {
      name: "AI Engineer",
      desc: "Finish the course on Udemy",
      pct: 33, total: 3,
      accent: "var(--purple)",
      tasks: [
        { title: "Python", status: "done", tags: ["Career"] },
        { title: "NLP", status: "todo", time: "1m", tags: ["Career"] },
        { title: "LLM", status: "todo", tags: ["Career"] },
      ]
    },
    {
      name: "University",
      pct: 94, total: 17,
      accent: "var(--green)",
      tasks: [
        { title: "Finish Math HW 2 & Bonus 2", status: "done" },
        { title: "Finish Math HW 1 & Bonus 1", status: "done" },
        { title: "Finish Math HW 3 & Bonus 3", status: "done" },
        { title: "NewTrends W1 Assignment", status: "done" },
        { title: "NewTrends W2 & 3 Assignment", status: "done" },
        { title: "Finish Math HW 4 & Bonux 4", status: "done", date: "Overdue (Mar 13)", overdue: true },
        { title: "Finish Building the Future Assignment", status: "done", date: "Overdue (Mar 16)", overdue: true },
        { title: "Finish Building The Future Assignment 2", status: "done", date: "Overdue (Mar 19)", overdue: true },
        { title: "Finish Physics Homework", status: "done", date: "Overdue (Mar 18)", overdue: true },
        { title: "Prepare for Software Engineer Exam", status: "done", time: "2h 25m" },
        { title: "Finish HW 6 and Bonus 6", status: "done" },
        { title: "Finish your Software Engineer Presentation tasks", status: "done", time: "1h" },
        { title: "Finish and submit 7 HW and Bonus", status: "done", time: "1h" },
        { title: "Finish New Trends assignment 11", status: "done", date: "Overdue (Apr 23)", overdue: true, time: "25m" },
        { title: "Intro to Database HW", status: "done", date: "Due Apr 26", time: "47m" },
        { title: "Intro to Database Quiz", status: "done", time: "7m" },
        { title: "Math HW 8 & Bonus 8", status: "todo", date: "May 2" },
      ]
    },
    {
      name: "Final Exams",
      pct: 0, total: 0,
      accent: "var(--amber)",
      tasks: []
    }
  ];

  const labels = { todo: "TO DO", done: "DONE", progress: "IN PROGRESS" };

  function renderTask(t, accent) {
    const tags = (t.tags || []).slice(0,2).map(x => `<span class="tag">${x}</span>`).join("");
    const date = t.date ? `<span class="task-date ${t.overdue ? "overdue":""}">📅 ${t.date}</span>` : "";
    const meta = (date || tags) ? `<div class="task-meta">${date}${tags}</div>` : "";
    const time = t.time ? `<span class="time-chip">⏱ ${t.time}</span>` : "";
    return `
      <div class="task">
        <span class="pdot" style="background:${accent}"></span>
        <div class="task-main">
          <div class="task-title">${t.title}</div>
          ${meta}
        </div>
        ${time}
        <span class="status ${t.status}">${labels[t.status]}</span>
      </div>
    `;
  }

  function render() {
    const root = document.getElementById("goals");
    root.innerHTML = goals.map((g, idx) => `
      <article class="goal ${g.open ? "open":""}" data-idx="${idx}">
        <button class="goal-head" onclick="toggle(${idx})">
          <span class="chev">▸</span>
          <div class="goal-info">
            <div class="goal-row">
              <div class="goal-name">${g.name}</div>
              <div class="row-actions">
                <span class="mini">✎</span>
                <span class="mini">🗑</span>
              </div>
            </div>
            <div class="progress-row">
              <span class="tasks-count">${g.total} tasks</span>
              <div class="bar"><span style="width:${g.pct}%"></span></div>
              <span class="pct grad-text">${g.pct}%</span>
            </div>
            ${g.desc ? `<p class="goal-desc">${g.desc}</p>` : ""}
          </div>
        </button>
        <div class="goal-body">
          ${g.tasks.map(t => renderTask(t, g.accent)).join("")}
          <button class="add-task">＋ Add Task</button>
        </div>
      </article>
    `).join("");
  }

  function toggle(i) {
    goals[i].open = !goals[i].open;
    render();
  }

  render();
</script>
</body>
</html>
